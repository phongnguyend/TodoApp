spring:
  application:
    name: todo-api

  # ── DataSource (analogous to appsettings.json ConnectionStrings) ─────────────
  datasource:
    url: jdbc:h2:file:./todo;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  # H2 web console (development only) - http://localhost:8080/h2-console
  h2:
    console:
      enabled: true
      path: /h2-console

  # ── JPA / Hibernate ──────────────────────────────────────────────────────────
  jpa:
    hibernate:
      # "validate" - Flyway owns the schema; Hibernate only validates it
      # (analogous to EF Core not running migrations automatically at startup)
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # ── Flyway (analogous to `dotnet ef database update`) ────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration

  # ── Multipart uploads (servlet-level hard cap; app.file.max-upload-size-bytes
  #    below enforces the actual business rule and returns a friendlier 413) ────
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# ── File storage (analogous to FILE_STORAGE_PATH / MAX_UPLOAD_SIZE_BYTES env vars) ─
app:
  file:
    storage-path: ${FILE_STORAGE_PATH:./uploads}
    max-upload-size-bytes: ${MAX_UPLOAD_SIZE_BYTES:10485760}
  user:
    jwt-secret: ${JWT_SECRET_KEY:change-me}
    jwt-token-lifetime-minutes: ${JWT_TOKEN_LIFETIME_MINUTES:60}
    password-hash-iterations: ${PASSWORD_HASH_ITERATIONS:120000}
    password-reset:
      secret: ${PASSWORD_RESET_SECRET_KEY:${JWT_SECRET_KEY:change-me}}
      token-lifetime-minutes: ${PASSWORD_RESET_TOKEN_LIFETIME_MINUTES:60}
      confirmation-url: ${PASSWORD_RESET_CONFIRMATION_URL:/reset-password}

# ── Server ────────────────────────────────────────────────────────────────────
server:
  port: 8080

# ── SpringDoc / Swagger UI ────────────────────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger          # mirrors ASP.NET Core's UseSwaggerUI default path
  api-docs:
    path: /v3/api-docs

---
# PostgreSQL profile - activate with: --spring.profiles.active=postgres
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: jdbc:postgresql://localhost:5432/todo_db
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  h2:
    console:
      enabled: false
