# Worker profile — activated by: --spring.profiles.active=worker
# Disables the embedded web server; only the WorkerRunner loop runs.

spring:
  main:
    web-application-type: none   # no Tomcat / web server in this process

  # H2 web console is irrelevant without a web server
  h2:
    console:
      enabled: false

  # ── JavaMail / SMTP ─────────────────────────────────────────────────────────
  # All values fall back to env-var overrides; defaults are suitable for a
  # local MailHog / SMTP4Dev container in development.
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS:false}

# ── Worker settings ──────────────────────────────────────────────────────────
worker:
  interval-minutes: ${WORKER_INTERVAL_MINUTES:60}
  email:
    recipient: ${EMAIL_RECIPIENT:admin@example.com}
    sender: ${EMAIL_SENDER:noreply@example.com}
