spring:
  application:
    name: todo-api

  # ── DataSource (analogous to appsettings.json ConnectionStrings) ─────────────
  datasource:
    url: jdbc:h2:file:./todo;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  # H2 web console (development only) — http://localhost:8080/h2-console
  h2:
    console:
      enabled: true
      path: /h2-console

  # ── JPA / Hibernate ──────────────────────────────────────────────────────────
  jpa:
    hibernate:
      # "validate" — Flyway owns the schema; Hibernate only validates it
      # (analogous to EF Core not running migrations automatically at startup)
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # ── Flyway (analogous to `dotnet ef database update`) ────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration

# ── Server ────────────────────────────────────────────────────────────────────
server:
  port: 8080

# ── SpringDoc / Swagger UI ────────────────────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger          # mirrors ASP.NET Core's UseSwaggerUI default path
  api-docs:
    path: /v3/api-docs

---
# PostgreSQL profile — activate with: --spring.profiles.active=postgres
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: jdbc:postgresql://localhost:5432/todo_db
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  h2:
    console:
      enabled: false
