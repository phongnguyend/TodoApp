name: CI — Java

on:
  push:
    paths:
      - 'src/backend/java/**'
      - '.github/workflows/ci-java.yml'
  pull_request:
    paths:
      - 'src/backend/java/**'
      - '.github/workflows/ci-java.yml'

defaults:
  run:
    working-directory: src/backend/java

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run unit tests
        run: mvn test -B

      - name: Build with Maven
        run: mvn package -DskipTests -B

      - name: Upload API JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: todo-api-java
          path: src/backend/java/todo-api/target/*.jar
          retention-days: 1

      - name: Upload Worker JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: todo-worker-java
          path: src/backend/java/todo-worker/target/*.jar
          retention-days: 1

  docker:
    name: Docker Build — API
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: src/backend/java
          file: src/backend/java/todo-api/Dockerfile
          push: false
          tags: todo-api-java:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-worker:
    name: Docker Build — Worker
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Worker Docker image
        uses: docker/build-push-action@v6
        with:
          context: src/backend/java
          file: src/backend/java/todo-worker/Dockerfile
          push: false
          tags: todo-worker-java:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
