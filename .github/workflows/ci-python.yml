name: CI — Python

on:
  push:
    paths:
      - 'src/backend/python/**'
      - '.github/workflows/ci-python.yml'
  pull_request:
    paths:
      - 'src/backend/python/**'
      - '.github/workflows/ci-python.yml'

defaults:
  run:
    working-directory: src/backend/python

jobs:
  build:
    name: Install & Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: src/backend/python/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check syntax
        run: python -m compileall app/

      - name: Verify app imports
        run: python -c "from app.main import app; print('App loaded successfully')"

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: src/backend/python
          push: false
          tags: todo-api-python:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
