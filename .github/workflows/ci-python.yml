name: CI - Python

on:
  push:
    paths:
      - 'src/backend/python/**'
      - '.github/workflows/ci-python.yml'
  pull_request:
    paths:
      - 'src/backend/python/**'
      - '.github/workflows/ci-python.yml'

defaults:
  run:
    working-directory: src/backend/python

jobs:
  build:
    name: Install & Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          version: '0.11.29'
          enable-cache: true
          cache-dependency-glob: src/backend/python/uv.lock

      - name: Install Python
        run: uv python install 3.14

      - name: Sync dependencies
        run: uv sync --locked

      - name: Check syntax
        run: uv run python -m compileall api/ worker/ shared/

      - name: Verify app imports
        run: uv run python -c "from api.main import app; print('App loaded successfully')"

      - name: Verify worker imports
        run: uv run python -c "from worker.main import main; print('Worker loaded successfully')"

      - name: Run unit tests
        run: uv run pytest tests/ -v

  docker:
    name: Docker Build - API
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Docker image
        uses: docker/build-push-action@v6
        with:
          context: src/backend/python
          file: src/backend/python/api/Dockerfile
          push: false
          tags: todo-api-python:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-worker:
    name: Docker Build - Worker
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Worker Docker image
        uses: docker/build-push-action@v6
        with:
          context: src/backend/python
          file: src/backend/python/worker/Dockerfile
          push: false
          tags: todo-worker-python:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

