name: CI — Node.js

on:
  push:
    paths:
      - 'src/backend/nodejs/**'
      - '.github/workflows/ci-nodejs.yml'
  pull_request:
    paths:
      - 'src/backend/nodejs/**'
      - '.github/workflows/ci-nodejs.yml'

defaults:
  run:
    working-directory: src/backend/nodejs

jobs:
  build:
    name: Install & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: src/backend/nodejs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: src/backend/nodejs
          push: false
          tags: todo-api-nodejs:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
