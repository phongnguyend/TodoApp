name: CI - Go

on:
  push:
    paths:
      - 'src/backend/go/**'
      - '.github/workflows/ci-go.yml'
  pull_request:
    paths:
      - 'src/backend/go/**'
      - '.github/workflows/ci-go.yml'

defaults:
  run:
    working-directory: src/backend/go

jobs:
  build:
    name: Download & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: src/backend/go/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: CGO_ENABLED=1 go build -v ./cmd/api

      - name: Build worker
        run: CGO_ENABLED=1 go build -v ./cmd/worker

      - name: Run unit tests
        run: CGO_ENABLED=1 go test -v -cover ./...

  docker:
    name: Docker Build - API
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: src/backend/go
          file: src/backend/go/build/api/Dockerfile
          push: false
          tags: todo-api-go:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-worker:
    name: Docker Build - Worker
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Worker Docker image
        uses: docker/build-push-action@v6
        with:
          context: src/backend/go
          file: src/backend/go/build/worker/Dockerfile
          push: false
          tags: todo-worker-go:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
